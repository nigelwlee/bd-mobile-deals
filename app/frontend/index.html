<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner Deal Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 100px;
    }

    .header {
      text-align: center;
      padding: 24px 0 16px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }
    .header p {
      font-size: 13px;
      color: #8b949e;
      margin-top: 4px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 14px;
    }
    .field:last-child {
      margin-bottom: 0;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: #c9d1d9;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .field input, .field select {
      width: 100%;
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: #58a6ff;
    }

    .tap-edit-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tap-edit-value {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      flex: 1;
    }
    .tap-edit-value:hover {
      border-color: #58a6ff;
    }
    .tap-edit-display {
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
      flex: 1;
    }
    .tap-edit-hint {
      font-size: 12px;
      color: #484f58;
    }
    .tap-edit-pencil {
      font-size: 14px;
      color: #484f58;
      transition: color 0.15s;
    }
    .tap-edit-value:hover .tap-edit-pencil {
      color: #58a6ff;
    }
    .tap-edit-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .tap-edit-input-wrap input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #58a6ff;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 16px;
      font-weight: 600;
      padding: 8px 14px;
      outline: none;
      width: 100%;
    }
    .tap-edit-suffix {
      font-size: 14px;
      color: #8b949e;
      white-space: nowrap;
    }
    .tap-edit-confirm {
      background: #238636;
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tap-edit-confirm:hover {
      background: #2ea043;
    }

    .input-wrap {
      position: relative;
    }
    .input-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #484f58;
      font-size: 15px;
    }
    .input-wrap input {
      padding-left: 24px;
    }

    /* Financials output */
    .financials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .fin-item {
      background: #0d1117;
      border-radius: 8px;
      padding: 12px;
    }
    .fin-item.full-width {
      grid-column: 1 / -1;
    }
    .fin-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .fin-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
    }
    .fin-value.green { color: #3fb950; }
    .fin-value.blue { color: #58a6ff; }
    .fin-value.yellow { color: #d29922; }
    .fin-value.red { color: #f85149; }

    /* Guardrail warnings */
    .guardrail-warning {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .guardrail-warning.warning {
      background: #2d2000;
      border: 1px solid #d29922;
      color: #d29922;
    }
    .guardrail-warning.hard_block {
      background: #2d0000;
      border: 1px solid #f85149;
      color: #f85149;
    }
    .guardrail-warning:last-child { margin-bottom: 0; }
    .guardrail-icon { font-size: 16px; flex-shrink: 0; }

    /* Bonus tier table */
    .tier-table {
      width: 100%;
      border-collapse: collapse;
    }
    .tier-table th {
      font-size: 11px;
      color: #8b949e;
      text-align: left;
      padding: 4px 8px 8px;
      font-weight: 500;
    }
    .tier-table td { padding: 4px 8px; }
    .tier-table input {
      width: 100%;
      padding: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 14px;
    }
    .tier-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .tier-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #8b949e;
    }
    .tier-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .tier-btn.remove { color: #f85149; }

    .finalize-btn {
      width: 100%;
      padding: 14px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .finalize-btn:hover { background: #2ea043; }
    .finalize-btn:disabled {
      background: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }

    .margin-bar-container {
      margin-top: 6px;
    }
    .margin-bar {
      height: 6px;
      border-radius: 3px;
      background: #30363d;
      overflow: hidden;
    }
    .margin-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid #21262d;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .label { color: #8b949e; }
    .breakdown-row .value { color: #c9d1d9; font-weight: 500; }
    .breakdown-row .value.negative { color: #f85149; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useCallback } = React;

    const DURATION_OPTIONS = [3, 6, 12, 18, 24, 36];

    const DEFAULT_BONUS_TIERS = [
      { revenueThreshold: 500000, bonusPct: 2 },
      { revenueThreshold: 1500000, bonusPct: 3 },
      { revenueThreshold: 5000000, bonusPct: 5 },
    ];

    // -- Formatted number input component --
    // Shows commas when blurred, raw number when focused

    function NumInput({ value, onChange, prefix, step, decimals = 0, placeholder }) {
      const [editing, setEditing] = useState(false);
      const [editText, setEditText] = useState("");

      const displayValue = editing ? editText : (
        decimals > 0
          ? Number(value).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals })
          : Math.round(Number(value)).toLocaleString()
      );

      const handleFocus = (e) => {
        setEditing(true);
        setEditText(value === 0 ? "" : String(value));
        setTimeout(() => e.target.select(), 0);
      };

      const handleBlur = () => {
        setEditing(false);
        const parsed = decimals > 0 ? parseFloat(editText) : parseInt(editText);
        onChange(isNaN(parsed) ? 0 : parsed);
      };

      const handleChange = (e) => {
        setEditText(e.target.value);
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter") e.target.blur();
      };

      if (prefix) {
        return (
          <div className="input-wrap">
            <span className="input-prefix">{prefix}</span>
            <input
              type={editing ? "text" : "text"}
              inputMode="decimal"
              value={displayValue}
              onFocus={handleFocus}
              onBlur={handleBlur}
              onChange={handleChange}
              onKeyDown={handleKeyDown}
              placeholder={placeholder}
            />
          </div>
        );
      }

      return (
        <input
          type="text"
          inputMode="decimal"
          value={displayValue}
          onFocus={handleFocus}
          onBlur={handleBlur}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          placeholder={placeholder}
        />
      );
    }

    // -- Tap-to-edit value component (replaces sliders) --

    function TapEdit({ value, onChange, min, max, step, suffix, decimals = 0 }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState("");
      const inputRef = useRef(null);

      const open = () => {
        setDraft(String(value));
        setEditing(true);
        setTimeout(() => { if (inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, 0);
      };

      const commit = () => {
        setEditing(false);
        let v = decimals > 0 ? parseFloat(draft) : parseInt(draft);
        if (isNaN(v)) return;
        if (min !== undefined) v = Math.max(min, v);
        if (max !== undefined) v = Math.min(max, v);
        if (step && step < 1) v = Math.round(v / step) * step;
        onChange(v);
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter") commit();
        if (e.key === "Escape") setEditing(false);
      };

      if (editing) {
        return (
          <div className="tap-edit-row">
            <div className="tap-edit-input-wrap">
              <input
                ref={inputRef}
                type="text"
                inputMode="decimal"
                value={draft}
                onChange={e => setDraft(e.target.value)}
                onKeyDown={handleKeyDown}
                onBlur={commit}
              />
              {suffix && <span className="tap-edit-suffix">{suffix}</span>}
            </div>
          </div>
        );
      }

      const display = decimals > 0
        ? Number(value).toFixed(decimals)
        : String(value);

      return (
        <div className="tap-edit-row">
          <div className="tap-edit-value" onClick={open}>
            <span className="tap-edit-display">{display}{suffix}</span>
            <span className="tap-edit-hint">{min}–{max}</span>
            <span className="tap-edit-pencil">&#9998;</span>
          </div>
        </div>
      );
    }

    // -- Calculator logic (mirrors Python engine) --

    function computeBonus(monthlyRevenue, tiers) {
      if (!tiers.length) return 0;
      const sorted = [...tiers].sort((a, b) => a.revenueThreshold - b.revenueThreshold);
      let total = 0;
      for (let i = 0; i < sorted.length; i++) {
        if (monthlyRevenue <= sorted[i].revenueThreshold) break;
        const ceiling = i + 1 < sorted.length ? sorted[i + 1].revenueThreshold : Infinity;
        const bandRevenue = Math.min(monthlyRevenue, ceiling) - sorted[i].revenueThreshold;
        total += bandRevenue * (sorted[i].bonusPct / 100);
      }
      return total;
    }

    function computeFinancials(terms) {
      const activePlayers = terms.monthlyNewPlayers * terms.playerRetentionMonths;
      const monthlyRevenue = activePlayers * terms.monthlySpendPerPlayer;

      const monthlyCpaCost = terms.monthlyNewPlayers * terms.costPerPlayer;
      const monthlyProfitShare = monthlyRevenue * (terms.profitSharePct / 100);
      const monthlyBonus = computeBonus(monthlyRevenue, terms.bonusTiers);
      const monthlyPartnerCost = monthlyCpaCost + monthlyProfitShare + monthlyBonus;

      const monthlyProfit = monthlyRevenue - monthlyPartnerCost;
      const marginPct = monthlyRevenue > 0 ? (monthlyProfit / monthlyRevenue) * 100 : 0;

      const ltv = terms.monthlySpendPerPlayer * terms.playerRetentionMonths;
      const cac = terms.costPerPlayer;
      const ltvCacRatio = cac > 0 ? ltv / cac : null;

      const totalContractValue = monthlyPartnerCost * terms.contractDurationMonths;
      const totalRevenue = monthlyRevenue * terms.contractDurationMonths;
      const totalProfit = monthlyProfit * terms.contractDurationMonths;

      return {
        monthlyNewPlayers: terms.monthlyNewPlayers,
        activePlayers,
        monthlyRevenue,
        monthlyCpaCost,
        monthlyProfitShare,
        monthlyBonus,
        monthlyPartnerCost,
        monthlyProfit,
        marginPct,
        ltv,
        cac,
        ltvCacRatio,
        totalContractValue,
        totalRevenue,
        totalProfit,
      };
    }

    // -- Guardrails --

    const GUARDRAILS = {
      cost_per_player: { min: 0.5, max: 50 },
      profit_share_pct: { min: 5, max: 40 },
      contract_duration: { min: 3, max: 36 },
      ltv_cac_ratio: { min: 3 },
      margin_pct: { min: 30 },
      total_contract_value: { max: 10000000 },
    };

    function checkGuardrails(terms, financials) {
      const breaches = [];

      if (terms.costPerPlayer > 0) {
        const g = GUARDRAILS.cost_per_player;
        if (terms.costPerPlayer < g.min)
          breaches.push({ level: "warning", message: `CPA $${terms.costPerPlayer.toFixed(2)} is below minimum $${g.min.toFixed(2)}` });
        else if (terms.costPerPlayer > g.max)
          breaches.push({ level: "warning", message: `CPA $${terms.costPerPlayer.toFixed(2)} exceeds maximum $${g.max.toFixed(2)}` });
      }

      if (terms.profitSharePct > 0) {
        const g = GUARDRAILS.profit_share_pct;
        if (terms.profitSharePct < g.min)
          breaches.push({ level: "warning", message: `Profit share ${terms.profitSharePct}% is below minimum ${g.min}%` });
        else if (terms.profitSharePct > g.max)
          breaches.push({ level: "warning", message: `Profit share ${terms.profitSharePct}% exceeds maximum ${g.max}%` });
      }

      const gd = GUARDRAILS.contract_duration;
      if (terms.contractDurationMonths < gd.min)
        breaches.push({ level: "warning", message: `Duration ${terms.contractDurationMonths}mo is below minimum ${gd.min}mo` });
      else if (terms.contractDurationMonths > gd.max)
        breaches.push({ level: "warning", message: `Duration ${terms.contractDurationMonths}mo exceeds maximum ${gd.max}mo` });

      if (financials.ltvCacRatio !== null && financials.ltvCacRatio < GUARDRAILS.ltv_cac_ratio.min)
        breaches.push({ level: "warning", message: `LTV/CAC ratio ${financials.ltvCacRatio.toFixed(1)}x is below minimum ${GUARDRAILS.ltv_cac_ratio.min}x` });

      if (financials.monthlyRevenue > 0 && financials.marginPct < GUARDRAILS.margin_pct.min)
        breaches.push({ level: "warning", message: `Margin ${financials.marginPct.toFixed(1)}% is below minimum ${GUARDRAILS.margin_pct.min}%` });

      if (financials.totalContractValue > GUARDRAILS.total_contract_value.max)
        breaches.push({ level: "warning", message: `Total contract value $${Math.round(financials.totalContractValue).toLocaleString()} exceeds $${GUARDRAILS.total_contract_value.max.toLocaleString()} threshold` });

      return breaches;
    }

    // -- Formatting --
    const fmt = (n) => "$" + Math.round(n).toLocaleString();
    const fmtK = (n) => {
      if (Math.abs(n) >= 1_000_000) return (n < 0 ? "-" : "") + "$" + (Math.abs(n) / 1_000_000).toFixed(1) + "M";
      if (Math.abs(n) >= 1_000) return (n < 0 ? "-" : "") + "$" + (Math.abs(n) / 1_000).toFixed(0) + "K";
      return "$" + Math.round(n).toLocaleString();
    };
    const fmtPct = (n) => n.toFixed(1) + "%";

    // -- App --
    function App() {
      const [partnerName, setPartnerName] = useState("GameChannel Co");
      const [monthlyNewPlayers, setMonthlyNewPlayers] = useState(10000);
      const [costPerPlayer, setCostPerPlayer] = useState(8);
      const [monthlySpendPerPlayer, setMonthlySpendPerPlayer] = useState(25);
      const [playerRetentionMonths, setPlayerRetentionMonths] = useState(6);
      const [profitSharePct, setProfitSharePct] = useState(15);
      const [contractDurationMonths, setContractDurationMonths] = useState(12);
      const [bonusTiers, setBonusTiers] = useState(DEFAULT_BONUS_TIERS);

      // Cost assumptions for forecasted net profit
      const [playerGiveawayPct, setPlayerGiveawayPct] = useState(20);
      const [overheadMarketingPct, setOverheadMarketingPct] = useState(40);

      const terms = {
        monthlyNewPlayers, costPerPlayer, monthlySpendPerPlayer,
        playerRetentionMonths, profitSharePct, contractDurationMonths, bonusTiers,
      };

      const financials = useMemo(() => computeFinancials(terms), [
        monthlyNewPlayers, costPerPlayer, monthlySpendPerPlayer,
        playerRetentionMonths, profitSharePct, contractDurationMonths,
        JSON.stringify(bonusTiers),
      ]);

      const breaches = useMemo(() => checkGuardrails(terms, financials), [terms, financials]);

      // Contract totals with cost assumptions
      const forecast = useMemo(() => {
        const totalRev = financials.totalRevenue;
        const giveawayCost = totalRev * (playerGiveawayPct / 100);
        const overheadCost = totalRev * (overheadMarketingPct / 100);
        const partnerPayout = financials.totalContractValue;
        const netProfit = totalRev - giveawayCost - overheadCost - partnerPayout;
        const netMarginPct = totalRev > 0 ? (netProfit / totalRev) * 100 : 0;
        return { totalRev, giveawayCost, overheadCost, partnerPayout, netProfit, netMarginPct };
      }, [financials, playerGiveawayPct, overheadMarketingPct]);

      const marginColor = financials.marginPct >= 60 ? "green"
        : financials.marginPct >= 30 ? "blue"
        : financials.marginPct >= 0 ? "yellow" : "red";

      const ltvCacColor = financials.ltvCacRatio === null ? "white"
        : financials.ltvCacRatio >= 5 ? "green"
        : financials.ltvCacRatio >= 3 ? "blue"
        : financials.ltvCacRatio >= 1 ? "yellow" : "red";

      const netProfitColor = forecast.netMarginPct >= 20 ? "green"
        : forecast.netMarginPct >= 5 ? "blue"
        : forecast.netMarginPct >= 0 ? "yellow" : "red";

      return (
        <div className="app">
          <div className="header">
            <h1>Partner Deal Calculator</h1>
            <p>Gaming player acquisition partnership economics</p>
          </div>

          {/* Partner & Player Acquisition */}
          <div className="card">
            <div className="card-title">Deal Setup</div>
            <div className="field">
              <label>Partner Name</label>
              <input value={partnerName} onChange={e => setPartnerName(e.target.value)} placeholder="e.g. GameChannel Co" />
            </div>
            <div className="field">
              <label>Monthly New Players</label>
              <NumInput value={monthlyNewPlayers} onChange={setMonthlyNewPlayers} />
            </div>
            <div className="field">
              <label>Cost Per Player (CPA)</label>
              <NumInput value={costPerPlayer} onChange={setCostPerPlayer} prefix="$" decimals={2} />
            </div>
          </div>

          {/* Player Economics */}
          <div className="card">
            <div className="card-title">Player Economics</div>
            <div className="field">
              <label>Avg Monthly Spend Per Player (ARPU)</label>
              <NumInput value={monthlySpendPerPlayer} onChange={setMonthlySpendPerPlayer} prefix="$" decimals={2} />
            </div>
            <div className="field">
              <label>Avg Player Retention (months)</label>
              <TapEdit value={playerRetentionMonths} onChange={setPlayerRetentionMonths}
                min={1} max={24} step={1} suffix="mo" />
            </div>
            <div className="field">
              <label>Profit Share %</label>
              <TapEdit value={profitSharePct} onChange={setProfitSharePct}
                min={1} max={50} step={0.5} suffix="%" decimals={1} />
            </div>
            <div className="field">
              <label>Contract Duration</label>
              <select value={contractDurationMonths} onChange={e => setContractDurationMonths(parseInt(e.target.value))}>
                {DURATION_OPTIONS.map(d => <option key={d} value={d}>{d} months</option>)}
              </select>
            </div>
          </div>

          {/* Bonus Tiers */}
          <div className="card">
            <div className="card-title">Revenue Bonus Tiers</div>
            <p style={{ fontSize: 12, color: "#8b949e", marginBottom: 10 }}>
              Extra payout % when total monthly revenue crosses these thresholds
            </p>
            <table className="tier-table">
              <thead>
                <tr><th>Revenue Threshold</th><th>Bonus %</th></tr>
              </thead>
              <tbody>
                {bonusTiers.map((tier, i) => (
                  <tr key={i}>
                    <td>
                      <NumInput value={tier.revenueThreshold} placeholder="e.g. 500,000"
                        onChange={v => {
                          const next = [...bonusTiers];
                          next[i] = { ...next[i], revenueThreshold: v };
                          setBonusTiers(next);
                        }} />
                    </td>
                    <td>
                      <NumInput value={tier.bonusPct} decimals={1}
                        onChange={v => {
                          const next = [...bonusTiers];
                          next[i] = { ...next[i], bonusPct: v };
                          setBonusTiers(next);
                        }} />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="tier-actions">
              <button className="tier-btn" onClick={() => {
                const last = bonusTiers[bonusTiers.length - 1];
                setBonusTiers([...bonusTiers, { revenueThreshold: (last?.revenueThreshold || 0) * 2, bonusPct: 2 }]);
              }}>+ Add Tier</button>
              {bonusTiers.length > 1 && (
                <button className="tier-btn remove" onClick={() => setBonusTiers(bonusTiers.slice(0, -1))}>Remove Last</button>
              )}
            </div>
          </div>

          {/* Cost Assumptions */}
          <div className="card">
            <div className="card-title">Cost Assumptions</div>
            <p style={{ fontSize: 12, color: "#8b949e", marginBottom: 10 }}>
              Assumed costs as % of revenue for forecasting net profit
            </p>
            <div className="field">
              <label>Player Giveaways / Promo Costs</label>
              <TapEdit value={playerGiveawayPct} onChange={setPlayerGiveawayPct}
                min={0} max={50} step={1} suffix="%" />
            </div>
            <div className="field">
              <label>Overhead & Marketing</label>
              <TapEdit value={overheadMarketingPct} onChange={setOverheadMarketingPct}
                min={0} max={70} step={1} suffix="%" />
            </div>
          </div>

          {/* Guardrail Warnings */}
          {breaches.length > 0 && (
            <div className="card">
              <div className="card-title">Guardrail Alerts</div>
              {breaches.map((b, i) => (
                <div key={i} className={`guardrail-warning ${b.level}`}>
                  <span className="guardrail-icon">{b.level === "hard_block" ? "\u26d4" : "\u26a0\ufe0f"}</span>
                  <span>{b.message}</span>
                </div>
              ))}
            </div>
          )}

          {/* Key Metrics */}
          <div className="card">
            <div className="card-title">Key Metrics</div>
            <div className="financials-grid">
              <div className="fin-item">
                <div className="fin-label">New Players / Mo</div>
                <div className="fin-value">{financials.monthlyNewPlayers.toLocaleString()}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Active Players</div>
                <div className="fin-value blue">{Math.round(financials.activePlayers).toLocaleString()}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Revenue / Mo</div>
                <div className="fin-value">{fmtK(financials.monthlyRevenue)}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Profit / Mo</div>
                <div className={`fin-value ${financials.monthlyProfit >= 0 ? "green" : "red"}`}>
                  {fmtK(financials.monthlyProfit)}
                </div>
              </div>
              <div className="fin-item">
                <div className="fin-label">LTV / Player</div>
                <div className="fin-value blue">{fmt(financials.ltv)}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">LTV / CAC</div>
                <div className={`fin-value ${ltvCacColor}`}>
                  {financials.ltvCacRatio !== null ? financials.ltvCacRatio.toFixed(1) + "x" : "N/A"}
                </div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Margin</div>
                <div className={`fin-value ${marginColor}`}>{fmtPct(financials.marginPct)}</div>
                <div className="margin-bar-container">
                  <div className="margin-bar">
                    <div className="margin-bar-fill" style={{
                      width: `${Math.max(0, Math.min(100, financials.marginPct))}%`,
                      background: marginColor === "green" ? "#3fb950"
                        : marginColor === "blue" ? "#58a6ff"
                        : marginColor === "yellow" ? "#d29922" : "#f85149",
                    }}></div>
                  </div>
                </div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Total Contract Value</div>
                <div className="fin-value blue">{fmtK(financials.totalContractValue)}</div>
              </div>
            </div>
          </div>

          {/* Partner Cost Breakdown */}
          <div className="card">
            <div className="card-title">Monthly Partner Cost Breakdown</div>
            <div className="breakdown-row">
              <span className="label">CPA Cost ({financials.monthlyNewPlayers.toLocaleString()} x ${costPerPlayer})</span>
              <span className="value">{fmt(financials.monthlyCpaCost)}</span>
            </div>
            <div className="breakdown-row">
              <span className="label">Profit Share ({profitSharePct}% of revenue)</span>
              <span className="value">{fmt(financials.monthlyProfitShare)}</span>
            </div>
            <div className="breakdown-row">
              <span className="label">Bonus Tier Payout</span>
              <span className="value">{fmt(financials.monthlyBonus)}</span>
            </div>
            <div className="breakdown-row" style={{ borderTop: "1px solid #30363d", paddingTop: 8, marginTop: 4 }}>
              <span className="label" style={{ color: "#c9d1d9", fontWeight: 600 }}>Total Partner Cost / Mo</span>
              <span className="value" style={{ color: "#d29922" }}>{fmt(financials.monthlyPartnerCost)}</span>
            </div>
          </div>

          {/* Contract P&L Forecast */}
          <div className="card">
            <div className="card-title">Contract P&L Forecast ({contractDurationMonths} months)</div>
            <div className="breakdown-row">
              <span className="label">Gross Revenue</span>
              <span className="value">{fmtK(forecast.totalRev)}</span>
            </div>
            <div className="breakdown-row">
              <span className="label">Less: Player Giveaways ({playerGiveawayPct}%)</span>
              <span className="value negative">-{fmtK(forecast.giveawayCost)}</span>
            </div>
            <div className="breakdown-row">
              <span className="label">Less: Overhead & Marketing ({overheadMarketingPct}%)</span>
              <span className="value negative">-{fmtK(forecast.overheadCost)}</span>
            </div>
            <div className="breakdown-row">
              <span className="label">Less: Partner Payout</span>
              <span className="value negative">-{fmtK(forecast.partnerPayout)}</span>
            </div>
            <div className="breakdown-row" style={{ borderTop: "2px solid #30363d", paddingTop: 10, marginTop: 6 }}>
              <span className="label" style={{ color: "#c9d1d9", fontWeight: 700, fontSize: 14 }}>Forecasted Net Profit</span>
              <span className="value" style={{ fontSize: 16 }}>
                <span className={forecast.netProfit >= 0 ? "" : "negative"}>
                  {forecast.netProfit < 0 ? "-" : ""}{fmtK(Math.abs(forecast.netProfit))}
                </span>
              </span>
            </div>
            <div className="breakdown-row" style={{ borderBottom: "none" }}>
              <span className="label">Net Margin</span>
              <span className={`value ${netProfitColor}`} style={{ fontWeight: 600 }}>
                {fmtPct(forecast.netMarginPct)}
              </span>
            </div>

            <div style={{ marginTop: 12 }} className="financials-grid">
              <div className="fin-item">
                <div className="fin-label">Total Revenue</div>
                <div className="fin-value">{fmtK(forecast.totalRev)}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Net Profit</div>
                <div className={`fin-value ${netProfitColor}`}>
                  {forecast.netProfit < 0 ? "-" : ""}{fmtK(Math.abs(forecast.netProfit))}
                </div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Partner Payout</div>
                <div className="fin-value blue">{fmtK(forecast.partnerPayout)}</div>
              </div>
              <div className="fin-item">
                <div className="fin-label">Net Margin</div>
                <div className={`fin-value ${netProfitColor}`}>{fmtPct(forecast.netMarginPct)}</div>
                <div className="margin-bar-container">
                  <div className="margin-bar">
                    <div className="margin-bar-fill" style={{
                      width: `${Math.max(0, Math.min(100, forecast.netMarginPct))}%`,
                      background: netProfitColor === "green" ? "#3fb950"
                        : netProfitColor === "blue" ? "#58a6ff"
                        : netProfitColor === "yellow" ? "#d29922" : "#f85149",
                    }}></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <button className="finalize-btn"
            onClick={() => alert(`Deal with ${partnerName} finalized!\n\nMonthly Revenue: ${fmtK(financials.monthlyRevenue)}\nLTV/CAC: ${financials.ltvCacRatio?.toFixed(1) ?? "N/A"}x\nTotal Contract: ${fmtK(financials.totalContractValue)}\n\nForecasted Net Profit: ${fmtK(forecast.netProfit)}\nNet Margin: ${fmtPct(forecast.netMarginPct)}`)}>
            Finalize Deal
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
